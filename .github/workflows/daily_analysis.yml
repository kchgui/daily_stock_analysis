name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'   # 北京时间每天18:00运行

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行股票分析
        env:
          # 只使用 AIHubMix（最稳定）
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          OPENAI_API_KEY: ${{ secrets.AIHUBMIX_KEY }}
          OPENAI_BASE_URL: "https://api.aihubmix.com/v1"
          OPENAI_MODEL: "gpt-4o-mini"
          
          # 你的自选股
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python main.py

      - name: 显示运行结果
        if: always()
        run: |
          echo "分析完成！请查看 Artifacts 获取报告"
